name: Publish Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag or commit to publish"
        required: false
      access:
        description: "npm publish access (public or restricted)"
        required: false
        default: "public"
      dry_run:
        description: "Run build/publish in dry-run mode"
        required: false
        default: "false"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    strategy:
      matrix:
        package:
          - packages/core
          - packages/sdk
          - packages/web
          - apps/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --dry-run

      - name: Build package
        working-directory: ${{ matrix.package }}
        run: bun run build ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Publish to npm
        if: ${{ github.event.inputs.dry_run != 'true' }}
        working-directory: ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --access ${{ github.event.inputs.access || 'public' }}
