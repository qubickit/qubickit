name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.1

      - name: Install dependencies
        run: bun install --dry-run

      - name: Lint
        run: bun run lint --dry-run

      - name: Test
        run: bun run test --dry-run

      - name: Build packages
        run: bun run build --dry-run
